name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Deploy to HuggingFace Spaces
        uses: huggingface/hf-spaces-push@v1
        with:
          hf_token: ${{ secrets.HF_TOKEN }}
          space_name: ${{ vars.HF_SPACE_NAME }}
